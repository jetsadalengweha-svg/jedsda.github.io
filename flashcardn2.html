<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N2 Flashcards — ShinKanzenMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Sarabun:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0d0f14;
–surface: #141720;
–card-front: #181c28;
–card-back: #1a1028;
–border: rgba(255,255,255,0.06);
–accent: #e84d6a;
–accent2: #7c5cfc;
–gold: #f0c060;
–text: #eeeaf5;
–text-dim: rgba(238,234,245,0.5);
–text-faint: rgba(238,234,245,0.25);
–kanji-color: #ffffff;
–reading-color: #b8aaff;
–en-color: #c8e0ff;
–th-color: #ffe8a0;
–radius: 20px;
–shadow: 0 20px 60px rgba(0,0,0,0.6);
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Sarabun’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 0;
overflow-x: hidden;
}

/* Background ambient glow */
body::before {
content: ‘’;
position: fixed;
top: -30%;
left: -20%;
width: 60%;
height: 60%;
background: radial-gradient(ellipse, rgba(124,92,252,0.08) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}
body::after {
content: ‘’;
position: fixed;
bottom: -20%;
right: -15%;
width: 50%;
height: 50%;
background: radial-gradient(ellipse, rgba(232,77,106,0.07) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

header {
position: relative;
z-index: 10;
width: 100%;
max-width: 680px;
padding: 32px 24px 0;
text-align: center;
}

.app-title {
font-family: ‘Noto Serif JP’, serif;
font-size: 13px;
font-weight: 400;
letter-spacing: 0.25em;
color: var(–text-faint);
text-transform: uppercase;
margin-bottom: 4px;
}

.level-badge {
display: inline-flex;
align-items: center;
gap: 8px;
background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(232,77,106,0.2));
border: 1px solid rgba(124,92,252,0.3);
border-radius: 50px;
padding: 6px 18px;
font-size: 13px;
font-weight: 600;
color: #c8b8ff;
margin-bottom: 16px;
letter-spacing: 0.05em;
}

.level-badge .dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–accent2);
box-shadow: 0 0 6px var(–accent2);
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

/* Progress bar */
.progress-wrap {
width: 100%;
max-width: 480px;
margin: 0 auto 8px;
padding: 0 24px;
position: relative;
z-index: 10;
}

.progress-label {
display: flex;
justify-content: space-between;
font-size: 11px;
color: var(–text-faint);
margin-bottom: 6px;
font-family: ‘DM Mono’, monospace;
}

.progress-bar {
height: 3px;
background: rgba(255,255,255,0.08);
border-radius: 10px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent2), var(–accent));
border-radius: 10px;
transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* Card area */
.card-area {
position: relative;
z-index: 10;
width: 100%;
max-width: 520px;
padding: 24px 24px 0;
perspective: 1200px;
}

.card-scene {
width: 100%;
aspect-ratio: 4/3;
position: relative;
transform-style: preserve-3d;
transition: transform 0.65s cubic-bezier(0.4,0,0.2,1);
cursor: pointer;
}

.card-scene.flipped {
transform: rotateY(180deg);
}

.card-face {
position: absolute;
inset: 0;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: var(–radius);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 36px 32px;
border: 1px solid var(–border);
box-shadow: var(–shadow);
}

.card-front {
background: linear-gradient(145deg, #1a1e30 0%, #131726 100%);
border-color: rgba(124,92,252,0.15);
}

.card-back {
background: linear-gradient(145deg, #1c1228 0%, #110e22 100%);
border-color: rgba(232,77,106,0.15);
transform: rotateY(180deg);
}

/* Card corner decoration */
.card-face::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
border-radius: var(–radius) var(–radius) 0 0;
}

.card-front::before {
background: linear-gradient(90deg, transparent, var(–accent2), transparent);
opacity: 0.6;
}

.card-back::before {
background: linear-gradient(90deg, transparent, var(–accent), transparent);
opacity: 0.6;
}

.card-hint {
position: absolute;
bottom: 14px;
right: 18px;
font-size: 10px;
color: var(–text-faint);
font-family: ‘DM Mono’, monospace;
letter-spacing: 0.1em;
}

.card-number {
position: absolute;
top: 14px;
left: 18px;
font-size: 10px;
color: var(–text-faint);
font-family: ‘DM Mono’, monospace;
}

/* Front content */
.kanji {
font-family: ‘Noto Serif JP’, serif;
font-size: clamp(52px, 10vw, 88px);
font-weight: 700;
color: var(–kanji-color);
text-align: center;
line-height: 1.1;
text-shadow: 0 0 40px rgba(255,255,255,0.1);
letter-spacing: 0.05em;
}

.tap-hint {
margin-top: 20px;
font-size: 12px;
color: var(–text-faint);
letter-spacing: 0.15em;
display: flex;
align-items: center;
gap: 6px;
}

.tap-icon {
width: 28px; height: 28px;
border-radius: 50%;
border: 1px solid rgba(255,255,255,0.15);
display: flex; align-items: center; justify-content: center;
font-size: 13px;
}

/* Back content */
.reading {
font-family: ‘Noto Serif JP’, serif;
font-size: clamp(20px, 4vw, 28px);
color: var(–reading-color);
margin-bottom: 20px;
letter-spacing: 0.1em;
text-align: center;
}

.divider {
width: 40px;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
margin-bottom: 20px;
}

.meaning-en {
font-size: clamp(15px, 2.5vw, 19px);
color: var(–en-color);
text-align: center;
line-height: 1.5;
margin-bottom: 12px;
font-weight: 400;
}

.meaning-th {
font-size: clamp(14px, 2vw, 17px);
color: var(–th-color);
text-align: center;
line-height: 1.6;
font-weight: 300;
}

/* Navigation */
.nav-row {
position: relative;
z-index: 10;
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
padding: 24px 24px;
width: 100%;
max-width: 520px;
}

.btn {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
border: none;
border-radius: 50px;
padding: 12px 24px;
font-family: ‘Sarabun’, sans-serif;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s ease;
letter-spacing: 0.03em;
text-decoration: none;
}

.btn:active { transform: scale(0.97); }

.btn-prev {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text-dim);
flex: 1;
}

.btn-prev:hover {
background: rgba(255,255,255,0.08);
color: var(–text);
}

.btn-next {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text-dim);
flex: 1;
}

.btn-next:hover {
background: rgba(255,255,255,0.08);
color: var(–text);
}

.btn-flip {
background: linear-gradient(135deg, var(–accent2), var(–accent));
color: #fff;
flex: 0 0 auto;
width: 52px; height: 52px;
padding: 0;
border-radius: 50%;
font-size: 20px;
box-shadow: 0 4px 20px rgba(124,92,252,0.4);
}

.btn-flip:hover {
box-shadow: 0 6px 28px rgba(124,92,252,0.6);
transform: scale(1.05);
}

/* Level navigation */
.level-nav {
position: relative;
z-index: 10;
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 0 24px 16px;
width: 100%;
max-width: 520px;
}

.level-link {
display: inline-flex;
align-items: center;
gap: 6px;
padding: 10px 20px;
border-radius: 50px;
font-size: 13px;
font-weight: 600;
text-decoration: none;
transition: all 0.2s;
letter-spacing: 0.03em;
cursor: pointer;
border: none;
font-family: ‘Sarabun’, sans-serif;
}

.level-link.prev-level {
background: rgba(124,92,252,0.1);
border: 1px solid rgba(124,92,252,0.25);
color: var(–accent2);
}

.level-link.prev-level:hover {
background: rgba(124,92,252,0.2);
box-shadow: 0 0 20px rgba(124,92,252,0.2);
}

.level-link.next-level {
background: rgba(232,77,106,0.1);
border: 1px solid rgba(232,77,106,0.25);
color: var(–accent);
flex: 1;
justify-content: center;
}

.level-link.next-level:hover {
background: rgba(232,77,106,0.2);
box-shadow: 0 0 20px rgba(232,77,106,0.2);
}

.level-link:disabled, .level-link.disabled {
opacity: 0.3;
cursor: not-allowed;
pointer-events: none;
}

/* Card dots indicator */
.dots-row {
position: relative;
z-index: 10;
display: flex;
gap: 6px;
justify-content: center;
padding: 0 24px 8px;
}

.dot-indicator {
width: 6px; height: 6px;
border-radius: 50%;
background: rgba(255,255,255,0.15);
transition: all 0.3s;
cursor: pointer;
}

.dot-indicator.active {
background: var(–accent2);
box-shadow: 0 0 8px rgba(124,92,252,0.6);
width: 18px;
border-radius: 3px;
}

.dot-indicator.done {
background: rgba(124,92,252,0.4);
}

/* Level overview strip */
.level-info-strip {
position: relative;
z-index: 10;
width: 100%;
max-width: 520px;
padding: 0 24px 32px;
text-align: center;
color: var(–text-faint);
font-size: 12px;
font-family: ‘DM Mono’, monospace;
letter-spacing: 0.08em;
}

/* Keyboard shortcut hint */
.shortcuts {
position: fixed;
bottom: 16px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 12px;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 50px;
padding: 8px 20px;
font-size: 11px;
color: var(–text-faint);
font-family: ‘DM Mono’, monospace;
z-index: 100;
}

.shortcuts kbd {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 4px;
padding: 1px 6px;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
}

/* Animations */
.card-area.animating .card-scene {
animation: slideInCard 0.3s cubic-bezier(0.4,0,0.2,1);
}

@keyframes slideInCard {
from { opacity: 0; transform: translateY(12px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 480px) {
.shortcuts { display: none; }
.card-face { padding: 24px 20px; }
.kanji { font-size: 60px; }
}
</style>

</div>

<div class="shortcuts">

  <span><kbd>P</kbd> Level ก่อน</span>
</div>

const PER_LEVEL = 10;
const TOTAL_LEVELS = Math.ceil(VOCAB.length / PER_LEVEL);

let currentLevel = 0;  // 0-indexed
let currentCard = 0;   // within level
let isFlipped = false;
let visitedCards = new Set();

function getLevelCards(level) {
  const start = level * PER_LEVEL;
  const end = Math.min(start + PER_LEVEL, VOCAB.length);
  return VOCAB.slice(start, end);
}

function getCardWord() {
  return getLevelCards(currentLevel)[currentCard];
}

function updateCard(animate = true) {
  const word = getCardWord();
  const levelCards = getLevelCards(currentLevel);
  const cardInLevel = currentCard + 1;
  const totalInLevel = levelCards.length;
  const globalIdx = currentLevel * PER_LEVEL + currentCard;

  // Reset flip
  const scene = document.getElementById('card-scene');
  isFlipped = false;
  scene.classList.remove('flipped');

  // Update content
  document.getElementById('front-expr').textContent = word.expression;
  document.getElementById('back-reading').textContent = word.reading;
  document.getElementById('back-en').textContent = word.meaning_en;
  document.getElementById('back-th').textContent = word.meaning_th || '–';
  document.getElementById('card-num').textContent = '#' + word.id;
  document.getElementById('back-card-num').textContent = '#' + word.id;

  // Level label
  document.getElementById('level-label').textContent = 
    'Level ' + (currentLevel + 1) + ' / ' + TOTAL_LEVELS;

  // Progress
  document.getElementById('prog-card').textContent = 
    'คำที่ ' + cardInLevel + ' / ' + totalInLevel;
  document.getElementById('prog-total').textContent = 
    'คำที่ ' + (globalIdx + 1) + '–' + (currentLevel * PER_LEVEL + totalInLevel) + ' จาก ' + VOCAB.length;

  const pct = (cardInLevel / totalInLevel) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';

  // Level strip
  const startNum = currentLevel * PER_LEVEL + 1;
  const endNum = currentLevel * PER_LEVEL + totalInLevel;
  document.getElementById('level-info-strip').textContent = 
    'LEVEL ' + (currentLevel + 1) + ' · คำที่ ' + startNum + '–' + endNum;

  // Dots
  updateDots(totalInLevel);

  // Buttons state
  document.getElementById('btn-prev').disabled = (currentLevel === 0 && currentCard === 0);
  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-prev-level').classList.toggle('disabled', currentLevel === 0);
  document.getElementById('btn-next-level').classList.toggle('disabled', currentLevel === TOTAL_LEVELS - 1);

  // Mark visited
  visitedCards.add(currentLevel + '-' + currentCard);

  // Animate
  if (animate) {
    const area = document.getElementById('card-area');
    area.classList.remove('animating');
    void area.offsetWidth;
    area.classList.add('animating');
  }
}

function updateDots(total) {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot-indicator';
    if (i === currentCard) d.classList.add('active');
    else if (visitedCards.has(currentLevel + '-' + i)) d.classList.add('done');
    const idx = i;
    d.onclick = () => { currentCard = idx; updateCard(); };
    row.appendChild(d);
  }
}

function flipCard() {
  const scene = document.getElementById('card-scene');
  isFlipped = !isFlipped;
  scene.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  const levelCards = getLevelCards(currentLevel);
  if (currentCard < levelCards.length - 1) {
    currentCard++;
    updateCard();
  } else {
    // Last card in level - prompt to go next level
    if (currentLevel < TOTAL_LEVELS - 1) {
      nextLevel();
    }
  }
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    updateCard();
  } else if (currentLevel > 0) {
    prevLevel();
  }
}

function nextLevel() {
  if (currentLevel < TOTAL_LEVELS - 1) {
    currentLevel++;
    currentCard = 0;
    updateCard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevLevel() {
  if (currentLevel > 0) {
    currentLevel--;
    currentCard = 0;
    updateCard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'l') nextCard();
  else if (e.key === 'ArrowLeft' || e.key === 'h') prevCard();
  else if (e.key === ' ' || e.key === 'f') { e.preventDefault(); flipCard(); }
  else if (e.key === 'n' || e.key === 'N') nextLevel();
  else if (e.key === 'p' || e.key === 'P') prevLevel();
});

// Init
updateCard(false);
</script>
