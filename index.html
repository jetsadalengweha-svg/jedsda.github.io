<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #f9f3e8;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: ‘Noto Serif TC’, serif;
}

.artwork {
width: 900px;
height: 340px;
background: #fff;
box-shadow: 0 8px 40px rgba(0,0,0,0.18);
display: flex;
position: relative;
overflow: hidden;
border: 3px solid #c8a84b;
outline: 6px solid #f9f3e8;
outline-offset: 3px;
}

.panel {
flex: 1;
position: relative;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.panel:not(:last-child) {
border-right: 2px solid #e8d9b0;
}

/* Character */
.char {
font-size: 130px;
font-weight: 900;
position: relative;
z-index: 10;
line-height: 1;
color: transparent;
-webkit-text-stroke: 2px rgba(60,20,10,0.85);
text-shadow: 4px 4px 0px rgba(180,40,20,0.15);
filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
animation: floatChar 4s ease-in-out infinite;
}

@keyframes floatChar {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-6px); }
}

/* Panel 1 - 龍 - Eagle/Phoenix + Sun + Mountains */
.panel-1 { background: linear-gradient(160deg, #fff8ee 0%, #fce8d0 60%, #e8f5e8 100%); }
.panel-1 .char { -webkit-text-stroke: 2.5px #8B1A1A; color: rgba(180,40,20,0.08); }

/* Panel 2 - 嘉 - Crane + Lanterns */
.panel-2 { background: linear-gradient(160deg, #f0f8ff 0%, #fff0f0 50%, #f0fff0 100%); }
.panel-2 .char { -webkit-text-stroke: 2.5px #1a5c1a; color: rgba(20,100,20,0.08); }

/* Panel 3 - 銘 - Lotus + Fish + Water */
.panel-3 { background: linear-gradient(160deg, #fff5f8 0%, #e8f8ff 60%, #fff8e8 100%); }
.panel-3 .char { -webkit-text-stroke: 2.5px #1a3a8B; color: rgba(20,60,180,0.08); }

/* SVG decorations */
.deco {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
}

/* Floating petals animation */
.petal {
animation: drift 6s ease-in-out infinite;
}
@keyframes drift {
0%, 100% { transform: translate(0,0) rotate(0deg); opacity:0.7; }
33% { transform: translate(4px,-8px) rotate(15deg); opacity:1; }
66% { transform: translate(-3px,-4px) rotate(-10deg); opacity:0.8; }
}

.crane-wing {
animation: flap 2.5s ease-in-out infinite;
transform-origin: center;
}
@keyframes flap {
0%, 100% { transform: scaleY(1); }
50% { transform: scaleY(0.75); }
}

/* Red seal bottom right */
.seal {
position: absolute;
bottom: 12px;
right: 14px;
width: 44px;
height: 44px;
background: #c0392b;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
color: #fff;
font-size: 11px;
font-weight: 900;
letter-spacing: 1px;
z-index: 20;
box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
writing-mode: vertical-rl;
text-orientation: mixed;
line-height: 1;
padding: 2px;
}
</style>
