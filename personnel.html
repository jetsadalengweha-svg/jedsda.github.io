<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แบบฟอร์มข้อมูลส่วนตัว</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
    h2 { text-align: center; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; margin-top: 20px; padding: 10px; background: #4CAF50;
             color: white; font-size: 16px; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #45a049; }
    #status { margin-top: 14px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <h2>กรอกข้อมูลส่วนตัว</h2>

  <label>ชื่อ</label>
  <input type="text" id="firstName" placeholder="ชื่อ">

  <label>นามสกุล</label>
  <input type="text" id="lastName" placeholder="นามสกุล">

  <label>อายุ</label>
  <input type="number" id="age" placeholder="อายุ" min="1" max="120">

  <label>เพศ</label>
  <select id="gender">
    <option value="">-- เลือกเพศ --</option>
    <option value="ชาย">ชาย</option>
    <option value="หญิง">หญิง</option>
    <option value="อื่นๆ">อื่นๆ</option>
  </select>

  <button onclick="submitForm()">บันทึกข้อมูล</button>
  <div id="status"></div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwILzk3emAzQmiVJOLNnhOCRQPzoQTRZfRaWMC1BhXbhpMoTR71_IvB4n1JovSjKgDtpg/exec"; // ← ใส่ URL ของคุณตรงนี้

    function submitForm() {
      var firstName = document.getElementById("firstName").value.trim();
      var lastName  = document.getElementById("lastName").value.trim();
      var age       = document.getElementById("age").value.trim();
      var gender    = document.getElementById("gender").value;
      var status    = document.getElementById("status");

      if (!firstName || !lastName || !age || !gender) {
        status.style.color = "red";
        status.textContent = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
        return;
      }

      status.style.color = "gray";
      status.textContent = "กำลังบันทึก...";

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ firstName, lastName, age, gender })
      })
      .then(res => res.json())
      .then(data => {
        if (data.result === "success") {
          status.style.color = "green";
          status.textContent = "✅ บันทึกข้อมูลสำเร็จ!";
          document.getElementById("firstName").value = "";
          document.getElementById("lastName").value = "";
          document.getElementById("age").value = "";
          document.getElementById("gender").value = "";
        }
      })
      .catch(() => {
        status.style.color = "red";
        status.textContent = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
      });
    }
  </script>
</body>
</html>
