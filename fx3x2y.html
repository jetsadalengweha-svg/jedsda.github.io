<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>f(x,y) = x³ − x² + y</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: #c084fc;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #5a5a7a;
    margin-bottom: 16px;
  }
  #chart {
    width: 96vw;
    max-width: 920px;
    height: 82vh;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(160,80,255,0.15);
  }
</style>
</head>
<body>

<h1>f(x, y) = x³ − x² + y</h1>
<p class="subtitle">−10 &lt; x &lt; 10 &nbsp;|&nbsp; −10 &lt; y &lt; 10</p>
<div id="chart"></div>

<script>
  const steps = 80;
  const xMin = -10, xMax = 10;
  const yMin = -10, yMax = 10;

  const x = [], y = [], z = [];

  for (let i = 0; i <= steps; i++)
    x.push(xMin + (xMax - xMin) * i / steps);

  for (let j = 0; j <= steps; j++)
    y.push(yMin + (yMax - yMin) * j / steps);

  for (let j = 0; j <= steps; j++) {
    const row = [];
    for (let i = 0; i <= steps; i++)
      row.push(Math.pow(x[i], 3) - Math.pow(x[i], 2) + y[j]);
    z.push(row);
  }

  const data = [{
    type: 'surface',
    x: x,
    y: y,
    z: z,
    colorscale: [
      [0.00, '#0d001a'],
      [0.10, '#2d006e'],
      [0.22, '#5b0ea6'],
      [0.34, '#8b35cc'],
      [0.46, '#b05bea'],
      [0.55, '#d08dff'],
      [0.64, '#e8b4f8'],
      [0.73, '#f9a8d4'],
      [0.84, '#fb7185'],
      [0.93, '#fbbf24'],
      [1.00, '#ffffff'],
    ],
    opacity: 0.96,
    contours: {
      z: {
        show: true,
        usecolormap: true,
        highlightcolor: '#ffffff',
        project: { z: true }
      },
      x: { show: false },
      y: { show: false }
    },
    lighting: {
      ambient:   0.45,
      diffuse:   0.85,
      specular:  0.5,
      roughness: 0.4,
      fresnel:   0.5
    },
    lightposition: { x: 2000, y: 1000, z: 3000 }
  }];

  const layout = {
    paper_bgcolor: '#0b0a14',
    scene: {
      bgcolor: '#0b0a14',
      xaxis: {
        title: { text: 'x', font: { color: '#c084fc', size: 13 } },
        gridcolor: '#1e1a30',
        zerolinecolor: '#5b2d8a',
        tickfont: { color: '#7a5a9a' },
        range: [xMin, xMax]
      },
      yaxis: {
        title: { text: 'y', font: { color: '#c084fc', size: 13 } },
        gridcolor: '#1e1a30',
        zerolinecolor: '#5b2d8a',
        tickfont: { color: '#7a5a9a' },
        range: [yMin, yMax]
      },
      zaxis: {
        title: { text: 'f(x,y)', font: { color: '#c084fc', size: 13 } },
        gridcolor: '#1e1a30',
        zerolinecolor: '#5b2d8a',
        tickfont: { color: '#7a5a9a' }
      },
      camera: {
        eye: { x: 1.6, y: -1.6, z: 0.9 }
      },
      aspectratio: { x: 1, y: 1, z: 0.75 }
    },
    margin: { l: 0, r: 0, t: 0, b: 0 }
  };

  const config = {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['sendDataToCloud'],
    displaylogo: false
  };

  Plotly.newPlot('chart', data, layout, config);
</script>

</body>
</html>
