<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>f(x,y) = x² - y²</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0ff;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 8px;
    color: #a0a8ff;
    letter-spacing: 1px;
  }
  p { font-size: 0.85rem; color: #6a6a9a; margin-bottom: 16px; }
  #chart { width: 95vw; max-width: 900px; height: 80vh; border-radius: 16px; overflow: hidden; }
</style>
</head>
<body>
<h1>f(x, y) = x² − y²</h1>
<p>−5 &lt; x &lt; 5 &nbsp;|&nbsp; −10 &lt; y &lt; 10</p>
<div id="chart"></div>

<script>
  const steps = 80;
  const xMin = -5, xMax = 5;
  const yMin = -10, yMax = 10;

  const x = [], y = [], z = [];

  for (let i = 0; i <= steps; i++) {
    x.push(xMin + (xMax - xMin) * i / steps);
  }
  for (let j = 0; j <= steps; j++) {
    y.push(yMin + (yMax - yMin) * j / steps);
  }
  for (let j = 0; j <= steps; j++) {
    const row = [];
    for (let i = 0; i <= steps; i++) {
      row.push(x[i] ** 2 - y[j] ** 2);
    }
    z.push(row);
  }

  const data = [{
    type: 'surface',
    x: x,
    y: y,
    z: z,
    colorscale: [
      [0.0,  '#0d0221'],
      [0.15, '#1a0a5e'],
      [0.30, '#2d1b99'],
      [0.45, '#4361ee'],
      [0.55, '#4cc9f0'],
      [0.65, '#80ffdb'],
      [0.75, '#f8961e'],
      [0.88, '#f94144'],
      [1.0,  '#ffffff'],
    ],
    opacity: 0.95,
    contours: {
      z: {
        show: true,
        usecolormap: true,
        highlightcolor: '#ffffff',
        project: { z: true }
      }
    },
    lighting: {
      ambient: 0.5,
      diffuse: 0.8,
      specular: 0.4,
      roughness: 0.5,
      fresnel: 0.4
    },
    lightposition: { x: 1000, y: 1000, z: 2000 }
  }];

  const layout = {
    paper_bgcolor: '#0f0f1a',
    scene: {
      bgcolor: '#0f0f1a',
      xaxis: {
        title: { text: 'x', font: { color: '#a0a8ff', size: 13 } },
        gridcolor: '#2a2a4a',
        zerolinecolor: '#4444aa',
        tickfont: { color: '#7070aa' },
        range: [xMin, xMax]
      },
      yaxis: {
        title: { text: 'y', font: { color: '#a0a8ff', size: 13 } },
        gridcolor: '#2a2a4a',
        zerolinecolor: '#4444aa',
        tickfont: { color: '#7070aa' },
        range: [yMin, yMax]
      },
      zaxis: {
        title: { text: 'f(x,y)', font: { color: '#a0a8ff', size: 13 } },
        gridcolor: '#2a2a4a',
        zerolinecolor: '#4444aa',
        tickfont: { color: '#7070aa' }
      },
      camera: {
        eye: { x: 1.6, y: -1.6, z: 0.8 }
      },
      aspectratio: { x: 1, y: 2, z: 1 }
    },
    margin: { l: 0, r: 0, t: 0, b: 0 },
    coloraxis: { showscale: false }
  };

  const config = {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['sendDataToCloud'],
    displaylogo: false
  };

  Plotly.newPlot('chart', data, layout, config);
</script>

</body>
</html>
