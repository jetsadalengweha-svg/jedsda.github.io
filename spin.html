<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Spin The Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --panel: #12121f;
    --border: #2a2a4a;
    --accent: #f0c040;
    --accent2: #ff5f7e;
    --text: #e8e8ff;
    --muted: #ffffff;
    --glow: 0 0 20px rgba(240,192,64,0.4);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Sarabun’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
background-image:
radial-gradient(ellipse 80% 50% at 50% -10%, rgba(80,40,160,0.3), transparent),
radial-gradient(ellipse 60% 40% at 80% 110%, rgba(240,80,80,0.12), transparent);
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(2.5rem, 6vw, 4.5rem);
letter-spacing: 0.12em;
color: var(–accent);
text-shadow: 0 0 40px rgba(240,192,64,0.6), 0 0 80px rgba(240,192,64,0.2);
margin: 2rem 0 0.3rem;
text-align: center;
}

.subtitle {
font-size: 0.95rem;
color: var(–muted);
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 2rem;
}

.main-layout {
display: flex;
gap: 2.5rem;
align-items: flex-start;
justify-content: center;
flex-wrap: wrap;
width: 100%;
max-width: 1100px;
padding: 0 1.5rem 3rem;
}

/* ── SETUP PANEL ── */
.setup-panel {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 20px;
padding: 1.8rem;
width: 300px;
flex-shrink: 0;
box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.setup-panel h2 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.5rem;
letter-spacing: 0.1em;
color: var(–accent);
margin-bottom: 1.2rem;
border-bottom: 1px solid var(–border);
padding-bottom: 0.8rem;
}

label {
display: block;
font-size: 0.82rem;
color: var(–muted);
letter-spacing: 0.08em;
text-transform: uppercase;
margin-bottom: 0.4rem;
margin-top: 1rem;
}

label:first-of-type { margin-top: 0; }

input[type=“number”], textarea {
width: 100%;
background: #0e0e1e;
border: 1px solid var(–border);
border-radius: 10px;
color: var(–text);
font-family: ‘Sarabun’, sans-serif;
font-size: 0.95rem;
padding: 0.6rem 0.9rem;
outline: none;
transition: border-color 0.2s;
resize: vertical;
}

input[type=“number”]:focus, textarea:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
}

textarea {
min-height: 140px;
line-height: 1.7;
}

.hint {
font-size: 0.78rem;
color: var(–muted);
margin-top: 0.35rem;
line-height: 1.5;
}

.count-badge {
display: inline-block;
background: rgba(240,192,64,0.15);
color: var(–accent);
border-radius: 30px;
font-size: 0.78rem;
padding: 0.15rem 0.7rem;
margin-left: 0.5rem;
font-weight: 700;
}

.btn-apply {
width: 100%;
margin-top: 1.5rem;
background: linear-gradient(135deg, #f0c040, #e08820);
border: none;
border-radius: 12px;
color: #1a0e00;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.2rem;
letter-spacing: 0.12em;
padding: 0.75rem;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
box-shadow: 0 4px 20px rgba(240,192,64,0.35);
}

.btn-apply:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(240,192,64,0.5); }
.btn-apply:active { transform: translateY(0); }

.error-msg {
color: var(–accent2);
font-size: 0.82rem;
margin-top: 0.5rem;
display: none;
}

/* ── WHEEL AREA ── */
.wheel-area {
display: flex;
flex-direction: column;
align-items: center;
gap: 0;
}

/* Extra space above wheel for the needle */
.wheel-outer {
position: relative;
padding-top: 68px;   /* room for needle above wheel */
}

.wheel-container {
position: relative;
width: 420px;
height: 420px;
filter: drop-shadow(0 0 30px rgba(240,192,64,0.2));
}

#wheelCanvas {
display: block;
border-radius: 50%;
}

/* ── NEEDLE ──
The needle sits inside .wheel-outer.
Its TIP (bottom point) should land exactly at the
top of the wheel rim: padding-top(68) + 8 = 76px from .wheel-outer top.
Needle total height = 76px  → top: 0
*/
.needle-wrap {
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
display: flex;
flex-direction: column;
align-items: center;
z-index: 20;
filter: drop-shadow(0 3px 10px rgba(0,0,0,0.9));
pointer-events: none;
}

/* Round cap at the very top */
.needle-cap {
width: 26px;
height: 26px;
background: radial-gradient(circle at 38% 32%, #ff9aaa, #cc1133);
border-radius: 50%;
border: 2.5px solid rgba(255,255,255,0.45);
box-shadow: 0 0 14px rgba(255,51,85,0.8), 0 0 30px rgba(255,51,85,0.3);
flex-shrink: 0;
z-index: 2;
}

/* Thin shaft connecting cap to arrowhead */
.needle-shaft {
width: 6px;
height: 30px;
background: linear-gradient(to bottom, #dd2244, #cc1133);
margin-top: -2px;
flex-shrink: 0;
}

/* Arrowhead — wide base at TOP, sharp TIP at BOTTOM */
.needle-tip {
width: 0;
height: 0;
border-left: 14px solid transparent;
border-right: 14px solid transparent;
border-top: 22px solid #cc1133;   /* ▼ tip points DOWN */
margin-top: -1px;
flex-shrink: 0;
}

/* Spin button — sits below wheel-outer with clear gap */
.spin-btn-row {
margin-top: 2rem;
}

.btn-spin {
background: linear-gradient(135deg, #ff5f7e, #cc1144);
border: none;
border-radius: 50px;
color: #fff;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.8rem;
letter-spacing: 0.18em;
padding: 0.7rem 3.5rem;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
box-shadow: 0 6px 30px rgba(255,50,80,0.45);
}

.btn-spin:hover:not(:disabled) { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 36px rgba(255,50,80,0.6); }
.btn-spin:active:not(:disabled) { transform: scale(0.97); }
.btn-spin:disabled { opacity: 0.45; cursor: not-allowed; }

/* Result */
#resultBox {
text-align: center;
min-height: 80px; 
color: #FFFFFF;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
opacity: 0;
transform: scale(0.8);
transition: opacity 0.5s, transform 0.5s;
max-width: 420px;
}

#resultBox.show {
opacity: 1;
transform: scale(1);
}

.result-label {
font-size: 0.85rem;
color: #ffffff;
letter-spacing: 0.2em;
text-transform: uppercase;
margin-bottom: 0.3rem;
}

#resultText {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(2rem, 6vw, 3.8rem);
letter-spacing: 0.08em;
line-height: 1.1;
color: #fff;
text-shadow:
0 0 20px rgba(255,255,255,0.8),
0 0 50px var(–resultColor, #f0c040),
0 0 100px var(–resultColor, #f0c040);
word-break: break-word;
text-align: center;
}

@keyframes popIn {
0% { transform: scale(0.6) rotate(-5deg); opacity: 0; }
70% { transform: scale(1.06) rotate(1deg); }
100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

#resultText.animate {
animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

/* confetti canvas */
#confettiCanvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 100;
}

/* Idle message */
.idle-msg {
font-size: 0.88rem;
color: var(–muted);
letter-spacing: 0.05em;
text-align: center;
}

@media (max-width: 780px) {
.wheel-container { width: 320px; height: 320px; }
.main-layout { gap: 1.5rem; }
.setup-panel { width: 100%; max-width: 420px; }
#resultBox { max-width: 320px; }
}
</style>

</head>
<body>

<h1>🎡 SPIN THE WHEEL</h1>
<p class="subtitle">ใส่ข้อมูล · หมุนวงล้อ · ลุ้นรางวัล</p>

  </div>

<script>
// ── Palette ──
const PALETTE = [
  '#FF6B6B','#FFA94D','#FFD93D','#6BCB77','#4ECDC4',
  '#45B7D1','#A78BFA','#F06292','#FF8A65','#81C784',
  '#64B5F6','#FFB74D','#E57373','#AED581','#4DB6AC',
  '#7986CB','#F48FB1','#80CBC4','#FFCC02','#69D2E7'
];

// ── State ──
let sectors = [];
let currentAngle = 0;      // radians, cumulative rotation
let spinning = false;
let spinSpeed = 0;          // radians per frame
let spinStartTime = 0;
let spinPhase = 'idle';     // idle | accelerate | constant | decelerate
let animFrame = null;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const R = cx - 8;

// ── Draw Wheel ──
function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!sectors.length) {
    // Placeholder
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = '#2a2a4a';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.fillStyle = '#444466';
    ctx.font = 'bold 1rem Sarabun, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ตั้งค่าวงล้อก่อน', cx, cy);
    return;
  }

  const n = sectors.length;
  const arc = (Math.PI * 2) / n;

  sectors.forEach((s, i) => {
    const startA = currentAngle + i * arc - Math.PI / 2;
    const endA   = startA + arc;

    // Sector fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startA, endA);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();

    // Subtle radial gradient overlay for depth
    const grad = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, R);
    grad.addColorStop(0, 'rgba(255,255,255,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Dividing line
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(
      cx + R * Math.cos(startA),
      cy + R * Math.sin(startA)
    );
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Text
    const midA = startA + arc / 2;
    const textR = R * 0.65;
    const tx = cx + textR * Math.cos(midA);
    const ty = cy + textR * Math.sin(midA);

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midA + Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const maxW = arc * R * 0.85;
    const fontSize = Math.min(18, Math.max(10, maxW / (s.title.length * 0.7 + 1)));
    ctx.font = `bold ${fontSize}px Sarabun, sans-serif`;

    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(s.title, 1.5, 1.5, maxW);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(s.title, 0, 0, maxW);
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 5;
  ctx.stroke();

  // Inner glow ring
  ctx.beginPath();
  ctx.arc(cx, cy, R - 3, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // ── Center hub (drawn on canvas, not a separate div) ──
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  // ── Reference notch at 12 o'clock (static, on the rim) ──
  // This is where the needle tip points — a small white V-notch
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - 8, 4);
  ctx.lineTo(cx, 13);
  ctx.lineTo(cx + 8, 4);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.restore();
}

// ── Apply Settings ──
function applySettings() {
  const n = parseInt(document.getElementById('numSectors').value);
  const raw = document.getElementById('titlesInput').value.trim();
  const titles = raw.split('\n').map(t => t.trim()).filter(t => t.length > 0);
  const errEl = document.getElementById('errorMsg');
  const badge = document.getElementById('countBadge');

  badge.textContent = titles.length;

  if (isNaN(n) || n < 2 || n > 20) {
    errEl.textContent = '⚠️ จำนวนช่องต้องอยู่ระหว่าง 2–20';
    errEl.style.display = 'block'; return;
  }
  if (titles.length !== n) {
    errEl.textContent = `⚠️ ต้องการ ${n} ชื่อ แต่ใส่มา ${titles.length} ชื่อ`;
    errEl.style.display = 'block'; return;
  }

  errEl.style.display = 'none';
  sectors = titles.map((t, i) => ({ title: t, color: PALETTE[i % PALETTE.length] }));
  currentAngle = 0;
  hideResult();
  drawWheel();

  document.getElementById('spinBtn').disabled = false;
  document.getElementById('idleMsg').style.display = 'none';
}

// Sync badge on input
document.getElementById('titlesInput').addEventListener('input', () => {
  const titles = document.getElementById('titlesInput').value.trim()
    .split('\n').filter(t => t.trim().length > 0);
  document.getElementById('countBadge').textContent = titles.length;
});

// ── Spin Logic ──
const TARGET_SPIN_TIME = 5000; // ms constant spin
const MAX_SPEED = 0.38;         // rad/frame at peak
const ACCEL_FRAMES = 40;

function startSpin() {
  if (spinning || !sectors.length) return;
  spinning = true;
  spinPhase = 'accelerate';
  spinSpeed = 0;
  spinStartTime = performance.now();
  hideResult();
  document.getElementById('spinBtn').disabled = true;

  // random extra rotation (0.5–4 full turns) added to target
  const extraRotations = (0.5 + Math.random() * 3.5) * Math.PI * 2;
  window._extraRotations = extraRotations;
  window._accelFrame = 0;
  window._constStart = null;
  window._decelStart = null;
  window._decelInitSpeed = 0;

  animate();
}

function animate() {
  const now = performance.now();

  if (spinPhase === 'accelerate') {
    window._accelFrame++;
    spinSpeed = MAX_SPEED * Math.min(1, window._accelFrame / ACCEL_FRAMES);
    if (window._accelFrame >= ACCEL_FRAMES) {
      spinPhase = 'constant';
      window._constStart = now;
    }
  }

  if (spinPhase === 'constant') {
    spinSpeed = MAX_SPEED;
    if (now - window._constStart >= TARGET_SPIN_TIME) {
      spinPhase = 'decelerate';
      window._decelStart = now;
      window._decelInitSpeed = spinSpeed;
      // We'll decelerate over ~2.5 seconds
    }
  }

  if (spinPhase === 'decelerate') {
    const elapsed = now - window._decelStart;
    const duration = 2500; // ms
    const t = Math.min(elapsed / duration, 1);
    // ease-out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    spinSpeed = window._decelInitSpeed * (1 - ease);

    if (t >= 1 || spinSpeed < 0.0008) {
      spinSpeed = 0;
      spinning = false;
      spinPhase = 'idle';
      drawWheel();
      showResult();
      document.getElementById('spinBtn').disabled = false;
      return;
    }
  }

  currentAngle += spinSpeed;
  drawWheel();
  animFrame = requestAnimationFrame(animate);
}

// ── Determine result ──
// The needle TIP is fixed at the 12-o'clock position on the canvas (angle = -π/2).
// Sectors are drawn starting from angle: (currentAngle + i*arc - π/2).
// We need the sector i whose angular span includes -π/2.
//
// Sector i spans canvas angles:
//   start = currentAngle + i*arc - π/2
//   end   = currentAngle + (i+1)*arc - π/2
//
// Needle at -π/2 is inside sector i when:
//   currentAngle + i*arc - π/2  ≤  -π/2  <  currentAngle + (i+1)*arc - π/2
// → currentAngle + i*arc  ≤  0  <  currentAngle + (i+1)*arc
// → i  ≤  -currentAngle/arc  <  i+1
// → i  =  floor(-currentAngle / arc)   (mod n)
//
// Normalise to [0, 2π) first to handle accumulated large angles.
function getWinner() {
  if (!sectors.length) return null;
  const n   = sectors.length;
  const arc = (Math.PI * 2) / n;

  // Bring -currentAngle into [0, 2π)
  const norm = ((-currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const idx  = Math.floor(norm / arc) % n;
  return idx;
}

// ── Show/Hide Result ──
function showResult() {
  const idx = getWinner();
  if (idx === null) return;
  const s = sectors[idx];

  // Draw a white glow highlight on the winning sector
  highlightSector(idx);

  const box = document.getElementById('resultBox');
  const txt = document.getElementById('resultText');

  txt.textContent = s.title;
  txt.style.setProperty('--resultColor', s.color);
  txt.style.color = '#fff';
  txt.style.textShadow = `0 0 20px rgba(255,255,255,0.9), 0 0 50px ${s.color}, 0 0 100px ${s.color}`;

  txt.classList.remove('animate');
  void txt.offsetWidth;
  txt.classList.add('animate');

  box.classList.add('show');
  launchConfetti(s.color);
}

function highlightSector(idx) {
  const n   = sectors.length;
  const arc = (Math.PI * 2) / n;
  const startA = currentAngle + idx * arc - Math.PI / 2;
  const endA   = startA + arc;

  // White overlay on the winning slice
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, R, startA, endA);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fill();

  // Bright border on the slice edges
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, R, startA, endA);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  // Redraw center hub on top
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
}

function hideResult() {
  const box = document.getElementById('resultBox');
  box.classList.remove('show');
}

// ── Confetti ──
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confParticles = [];
let confAnimating = false;

function launchConfetti(mainColor) {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = [];
  const colors = [mainColor, '#FFD93D', '#ffffff', '#FF6B6B', '#6BCB77', '#4ECDC4'];

  for (let i = 0; i < 160; i++) {
    confParticles.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 100,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      angle: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      vx: (Math.random() - 0.5) * 4,
      vy: 2.5 + Math.random() * 4,
      alpha: 1,
      gravity: 0.08 + Math.random() * 0.04
    });
  }

  if (!confAnimating) {
    confAnimating = true;
    animConf();
  }
}

function animConf() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  let alive = false;
  confParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.angle += p.rotSpeed;
    if (p.y > confCanvas.height * 0.7) p.alpha -= 0.025;
    if (p.alpha > 0) {
      alive = true;
      confCtx.save();
      confCtx.globalAlpha = Math.max(0, p.alpha);
      confCtx.translate(p.x, p.y);
      confCtx.rotate(p.angle);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      confCtx.restore();
    }
  });
  if (alive) requestAnimationFrame(animConf);
  else { confAnimating = false; confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height); }
}

// ── Init ──
drawWheel();
</script>
